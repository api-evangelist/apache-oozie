apis:
  - aid: apache-oozie:apache-oozie-rest-api
    name: Apache Oozie REST API
    description: >-
      The Oozie Web Services API provides REST endpoints for submitting, managing, and
      monitoring workflow, coordinator, and bundle jobs on Apache Hadoop. Supports full
      job lifecycle management (submit, start, suspend, resume, kill, rerun), log and
      status retrieval, DAG visualization, SLA management, and system administration.
      Available at /oozie/v1 and /oozie/v2 with JSON responses.
    humanURL: https://oozie.apache.org/docs/5.2.1/WebServicesAPI.html
    baseURL: http://localhost:11000/oozie
    tags:
      - REST
      - Hadoop
      - Workflow Management
      - Job Scheduling

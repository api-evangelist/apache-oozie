aid: apache-oozie
name: Apache Oozie
description: >-
  Apache Oozie is a workflow scheduler system for managing Apache Hadoop jobs. It enables
  users to define workflows as directed acyclic graphs (DAGs) of actions including
  MapReduce, Pig, Hive, Sqoop, and custom Java/shell steps. Coordinator jobs trigger
  workflows based on time schedules or data availability, while bundle jobs group
  multiple coordinators. Oozie provides a REST API for job submission, lifecycle
  management, monitoring, and system administration. Governed by the Apache Software
  Foundation under the Apache License 2.0, written in Java.

naftiko: "1.0.0-alpha1"

info:
  label: Apache Oozie REST API
  description: Shared capability definition for the Apache Oozie REST API covering workflow, coordinator, and bundle job management on Apache Hadoop.
  tags:
    - Apache Oozie
    - Hadoop
    - Workflow
    - Job Scheduling
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      OOZIE_URL: OOZIE_URL

capability:
  consumes:
    - type: http
      namespace: oozie
      baseUri: http://localhost:11000/oozie
      description: Apache Oozie REST API for managing Hadoop workflow, coordinator, and bundle jobs.
      resources:
        - name: admin
          path: /v1/admin
          description: System administration and monitoring.
          operations:
            - name: get-status
              method: GET
              description: Get current Oozie system mode.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-configuration
              method: GET
              description: Get Oozie system configuration.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-build-version
              method: GET
              description: Get Oozie build version information.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: jobs
          path: /v1/jobs
          description: Job submission and bulk management.
          operations:
            - name: submit-job
              method: POST
              description: Submit a workflow, coordinator, or bundle job.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: xml
                data: "<configuration></configuration>"
            - name: get-jobs
              method: GET
              description: List jobs with optional filters and pagination.
              inputParameters:
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: Filter criteria as key=value pairs.
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset.
                - name: len
                  in: query
                  type: integer
                  required: false
                  description: Maximum jobs to return.
                - name: jobtype
                  in: query
                  type: string
                  required: false
                  description: Filter by job type (wf, coordinator, bundle).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: bulk-job-action
              method: PUT
              description: Apply an action (kill, suspend, resume) to multiple matching jobs.
              inputParameters:
                - name: action
                  in: query
                  type: string
                  required: true
                  description: Action to apply (kill, suspend, resume).
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: Filter criteria for selecting jobs.
                - name: jobtype
                  in: query
                  type: string
                  required: false
                  description: Job type to target.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: job
          path: /v1/job
          description: Single job lifecycle management.
          operations:
            - name: get-job-info
              method: GET
              description: Get information, definition, or logs for a specific job.
              inputParameters:
                - name: job-id
                  in: path
                  type: string
                  required: true
                  description: The Oozie job identifier.
                - name: show
                  in: query
                  type: string
                  required: false
                  description: Response type (info, definition, log, graph).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: manage-job
              method: PUT
              description: Apply a management action (start, suspend, resume, kill, rerun) to a job.
              inputParameters:
                - name: job-id
                  in: path
                  type: string
                  required: true
                  description: The Oozie job identifier.
                - name: action
                  in: query
                  type: string
                  required: true
                  description: Action to apply to the job.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: apache-oozie-api
      resources:
        - path: /v1/admin/status
          name: admin-status
          description: System status monitoring.
          operations:
            - method: GET
              name: get-status
              description: Get Oozie system status.
              call: "oozie.get-status"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/jobs
          name: jobs
          description: Job management.
          operations:
            - method: GET
              name: list-jobs
              description: List Oozie jobs with filters.
              call: "oozie.get-jobs"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: submit-job
              description: Submit a new job.
              call: "oozie.submit-job"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: apache-oozie-mcp
      transport: http
      tools:
        - name: get-status
          description: Get the current Apache Oozie system mode and status.
          hints:
            readOnly: true
            openWorld: false
          call: "oozie.get-status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-jobs
          description: List Apache Oozie workflow, coordinator, or bundle jobs with optional filters.
          hints:
            readOnly: true
            openWorld: false
          call: "oozie.get-jobs"
          with:
            filter: "tools.filter"
            jobtype: "tools.jobtype"
            offset: "tools.offset"
            len: "tools.len"
          outputParameters:
            - type: object
              mapping: "$."

        - name: submit-job
          description: Submit an Oozie workflow, coordinator, or bundle job.
          hints:
            readOnly: false
            openWorld: false
          call: "oozie.submit-job"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-job-info
          description: Get information, definition, logs, or DAG graph for a specific Oozie job.
          hints:
            readOnly: true
            openWorld: false
          call: "oozie.get-job-info"
          with:
            job-id: "tools.jobId"
            show: "tools.show"
          outputParameters:
            - type: object
              mapping: "$."

        - name: manage-job
          description: Apply a lifecycle action (start, suspend, resume, kill, rerun) to an Oozie job.
          hints:
            readOnly: false
            openWorld: false
          call: "oozie.manage-job"
          with:
            job-id: "tools.jobId"
            action: "tools.action"
          outputParameters:
            - type: object
              mapping: "$."
